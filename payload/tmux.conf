set -g status on
set -g status-position bottom
set -g status-interval 5
set -g mouse on
set -g set-clipboard on
set -gu terminal-overrides
set -g history-limit 50000
set -g mode-keys vi
set -g status-style bg=green,fg=black
set -g status-left '[#S] '
set -g status-right-length 220
set -g status-right "#(/usr/bin/python3 \"$HOME/.gemini/tmux_status.py\" --pane-id '#{pane_id}' --pane-tty '#{pane_tty}' --pane-pid '#{pane_pid}' --pane-path '#{pane_current_path}' --pane-command '#{pane_current_command}' --pane-start-command '#{pane_start_command}' --session-name '#{session_name}')"

# Toggle tmux mouse mode to avoid conflicts with terminal-native scrolling.
bind m if-shell -F '#{mouse}' 'set mouse off \; display-message "mouse off | terminal scroll/select"' 'set mouse on \; display-message "mouse on | tmux scroll/copy"'

# Prefer tmux scrollback and mouse selection consistently across panes.
unbind -T root MouseDown1Pane
unbind -T root WheelUpPane
unbind -T root WheelDownPane
unbind -T root MouseDrag1Pane
unbind -T root DoubleClick1Pane
unbind -T root TripleClick1Pane
unbind -T copy-mode-vi MouseDown1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
unbind -T copy-mode-vi Enter
bind -T root MouseDown1Pane select-pane -t =
bind -T root WheelUpPane if-shell -F "#{pane_in_mode}" { send-keys -M } { copy-mode -eu }
bind -T root MouseDrag1Pane if-shell -F "#{pane_in_mode}" { send-keys -M } { copy-mode -M }
bind -T root DoubleClick1Pane select-pane -t = \; copy-mode -M \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "$HOME/.cliquota/bin/copy-text"
bind -T root TripleClick1Pane select-pane -t = \; copy-mode -M \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "$HOME/.cliquota/bin/copy-text"
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode-vi MouseDrag1Pane select-pane \; send-keys -X begin-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "$HOME/.cliquota/bin/copy-text"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "$HOME/.cliquota/bin/copy-text"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "$HOME/.cliquota/bin/copy-text"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$HOME/.cliquota/bin/copy-text"
